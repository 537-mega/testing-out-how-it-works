<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EconBoard | Public Discussion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1 onclick="app.goHome()">📊 EconBoard</h1>
            <input type="text" id="search-bar" placeholder="Search economic threads (e.g. 'Marxism', 'Inflation')..." onkeyup="app.filter()">
        </header>

        <main id="home-view">
            <section id="create-thread">
                <h3>Start a New Discussion</h3>
                <input type="text" id="new-thread-title" placeholder="Thread Topic...">
                <button onclick="app.createNewThread()">Post Thread</button>
            </section>

            <section id="bulletin-board">
                <h3>📌 Active Threads</h3>
                <div id="thread-list"></div>
            </section>
        </main>

        <main id="thread-view" style="display:none;">
            <div class="thread-header">
                <button onclick="app.goHome()">⬅ Back</button>
                <h2 id="current-thread-title"></h2>
            </div>
            <div id="chat-window"></div>
            <div id="input-area">
                <input type="text" id="msg-input" placeholder="Say something anonymous...">
                <button onclick="app.send()">Send</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
